{% extends "shop/boiler_plate.html" %}
{% block title %} Merchant Register {% endblock title %}
{% block body %}
{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }}">{{ message }}</div>
{% endfor %}
{% endif %}
<section class="vh-100" style="background-color: #eee;">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-lg-12 col-xl-11">
        <div class="card text-black" style="border-radius: 25px;">
          <div class="card-body p-md-5">
            <div class="row justify-content-center">
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Register Business</p>

                <form action="{% url 'merchant_account_register' %}" method="post" class="mx-1 mx-md-4">
                  {% csrf_token %}       
                    {{ merchant_form }}
                  <div class="form-check d-flex justify-content-center mb-5">
                    <span><input class="form-check-input me-2" type="checkbox" value="on" name="terms" id="terms" required/></span>
                    <label class="form-check-label" for="form2Example5c">
                      I agree all statements in <a href="#!">Terms of service</a>
                    </label>
                </div>
                  <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                    <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-lg">Register</button>
                  </div>
                </form>
              </div>
              <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                  class="img-fluid" alt="Sample image">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<script>
  $(document).ready(()=>{
    // adhar card details client validation as it has length of maximum 12 and first characters must be in between (2-9) each and other 11 characters can be in between (0-9) each.
    $("#id_adhar_card").on("input",function(element){
      const parent_node=$(this).parent();
      const details=$(this).val().replace(/[-\s]/g,'');
      const adhar_reg=/^[2-9]{1}[0-9]{11}$/;
      if((!adhar_reg.test(details) && details.length>0) || details.length>12){
        if($("#adhar_warning").length===0)
      {
        parent_node.append("<p id='adhar_warning' style='color:red;'>please enter valid adhar card details</p>");
        $("button[type='submit']").prop("disabled",true);
      }
      }
      else{
        $("#adhar_warning").remove();
        $("button[type='submit']").prop("disabled",false);
      }
    });
    // pan card details client validation as it has length of maximum 10 and first 5 characters must be alphabets with 4th character must be of specific type after that 4 characters must be integers(0-9) and last 1 character must be alphabet 
    $("#id_pan_card").on("input",function(element){
      const parent_node=$(this).parent();
      const details=$(this).val().toUpperCase().replace(/[-\s]/g,'');
      const pan_reg=/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
      const valid_chars=['P', 'C', 'H', 'F', 'A', 'T', 'B', 'L', 'J', 'G'];
      const isvalid=valid_chars.includes(details.charAt(3)) && pan_reg.test(details);
      if((!isvalid && details.length>0) || details.length>10){
        if($("#pan_warning").length===0)
      {
        parent_node.append("<p id='pan_warning' style='color:red;'>please enter valid pan card details</p>");
        $("button[type='submit']").prop("disabled",true);
      }
      }
      else{
        $("#pan_warning").remove();
        $("button[type='submit']").prop("disabled",false);
      }
      });
  document.getElementById("re_password").addEventListener("keyup",function(){
      var password=document.getElementById("password").value;
      var re_password=document.getElementById("re_password").value;
    if(password!=re_password){
     document.getElementById("password_error").style.display="block";
     $("button[type='submit']").prop("disabled",true);
    }
    else{
      document.getElementById("password_error").style.display="none";
      $("button[type='submit']").prop("disabled",false);
    }
  });
  });
</script>

{% endblock body %}
